gimbal_antiwindup_min_gain = 0.10
despike_count_enabled = false
[keyboard_left_stick]
enabled = false
throttle_up_key = "W"
throttle_down_key = "Space"
throttle_cut_key = "VK20"
throttle_rate = 4096
yaw_left_key = "A"
yaw_right_key = "D"
yaw_pulse = 512
yaw_slew_rate = 4096.0
invert_yaw = false

block_selected_keys = false
throttle_return_enabled = false
